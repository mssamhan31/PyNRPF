pipeline_schema_version: "1.0.0"

pynrpf_inference:
  schema_version: "0.2.0"
  columns:
    site: "substation_id"
    timestamp: "timestamp"
    net_load: "net_load_MW"
    solar: "solar_MW"
  runtime:
    interval_minutes: 15
    strict_validation: true
  model:
    selected_model: "m8_xgb"

pynrpf_training:
  schema_version: "0.3.0"
  model_id: "m8_xgb"
  labels:
    day: "label_day"
    interval: "label_interval"
  split:
    train_start: "2024-01-01"
    train_end: "2024-01-31"
    validation_start: "2024-02-01"
    validation_end: "2024-02-29"
  features:
    pipeline: "legacy_v1"
  thresholds:
    xgb1_day: 0.585985
    xgb2_timestamp: 0.892234
  random_seed: 9
  output:
    base_uri: "dbfs:/FileStore/pynrpf/artifacts"
    versioning: "timestamp_dir"
