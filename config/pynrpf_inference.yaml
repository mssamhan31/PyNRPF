schema_version: "0.2.0"

columns:
  site: "substation_id"
  timestamp: "timestamp"
  net_load: "net_load_MW"
  solar: "solar_MW"

runtime:
  interval_minutes: 15
  strict_validation: true

model:
  selected_model: "m7_dtr"   # choose one: m7_dtr, m8_xgb
  primary_model: "m7_dtr"
  enabled_models:
    - "m7_dtr"

  m7_threshold:
    solar_peak_tiebreak_time: "12:30"
    peak_window_minutes: 150
    min_threshold: 0.05
    min_threshold_both: 0.25

  m8_xgb:
    noon_hour_start: 6
    noon_hour_end: 18
    holiday_country: "AU"
    holiday_subdivision: "NSW"

    xgb1_day:
      objective: "binary:logistic"
      eval_metric: "aucpr"
      tree_method: "hist"
      eta: 0.1
      n_estimators: 500
      max_depth: 6
      min_child_weight: 3
      subsample: 0.8
      colsample_bytree: 0.8
      scale_pos_weight: 5
      seed: 9
      threshold: 0.585985

    xgb2_timestamp:
      objective: "binary:logistic"
      eval_metric: "aucpr"
      tree_method: "hist"
      eta: 0.1
      n_estimators: 500
      max_depth: 6
      min_child_weight: 3
      subsample: 0.8
      colsample_bytree: 0.8
      scale_pos_weight: 5
      seed: 9
      threshold: 0.892234

artifacts:
  # Required for m8_xgb inference.
  # Supports local paths, dbfs:/..., file://..., and http(s)://...
  m8_pretrained_bundle_uri: null

monitoring:
  enable_data_quality: true
  enable_confidence_summary: true
  enable_drift_summary: true

  # Optional baseline for drift summaries.
  reference_stats: {}
